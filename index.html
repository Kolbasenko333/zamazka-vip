<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. ДЫМ — САМЫЙ НИЖНИЙ ПЛАН (z-index: -2) */
        /* Мы используем cover, чтобы дым был один на весь экран без повторов */
        .smoke-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('green-smoke-spread-black-background.jpg') center center / cover no-repeat;
            z-index: -2;
            opacity: 0.9;
        }

        /* 2. ФИШКИ — СЛОЙ НАД ДЫМОМ (z-index: -1) */
        .chips-animation {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('ФИШКИ .png') repeat;
            background-size: 380px; /* Размер как на твоем самом первом удачном скрине */
            z-index: -1;
            mix-blend-mode: screen; /* Прячет черные квадраты вокруг фишек */
            opacity: 0.2;
            animation: chipsFalling 40s linear infinite;
        }

        @keyframes chipsFalling {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* КОНТЕНТ */
        header { padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        .hero { padding: 50px 20px; position: relative; z-index: 10; }

        /* ВОЗВРАЩАЕМ ТОТ САМЫЙ ЛИМОННЫЙ 3D ЗАГОЛОВОК */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 
                0 2px 0 #779900, 
                0 3px 0 #668800, 
                0 4px 0 #557700, 
                0 10px 20px rgba(0,0,0,0.8);
        }

        .sub-text { font-size: 1.4em; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 50px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        /* ИСПРАВЛЕННАЯ КАРТА (ОДНА, А НЕ МНОГО) */
        .card-box { margin-top: 40px; }
        .card-img { 
            width: 80%; max-width: 400px; 
            mix-blend-mode: screen; 
            opacity: 0.8;
            filter: drop-shadow(0 0 25px rgba(204,255,0,0.3));
        }

        .rb-text { color: #ccff00; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="smoke-bg"></div>
    <div class="chips-animation"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="color: #888; text-transform: uppercase; letter-spacing: 5px; font-size: 0.8em; margin-bottom: 10px;">Крупнейший союз СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">Начинается здесь</p>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-box">
            <img src="card_only.png" class="card-img">
        </div>
        
        <p class="rb-text">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </section>
</body>
</html>
