<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; color: #fff; margin: 0; overflow: hidden; text-align: center; }
        header { padding: 20px; background: #0c0d0c; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: center; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        .hero { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        h1 { color: #ccff00; font-size: 3.5em; margin: 0; line-height: 1.1; }
        p { color: #fff; max-width: 600px; margin: 20px auto; font-size: 1.1em; font-weight: 500; letter-spacing: 1px; }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4);
            margin-bottom: 20px;
            z-index: 10;
        }

        /* СЦЕНА ДЛЯ КАРТЫ (Расположение и перспектива) */
        .card-scene {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* Глубина 3D */
            overflow: visible; /* Чтобы свечение не обрезалось */
        }

        /* СТАТИЧНЫЙ ФОН (Премиальное свечение) */
        .card-bg {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(204, 255, 0, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 1; /* Фон сзади */
        }

        /* ПАРЯЩАЯ КАРТА */
        .card-actor {
            width: 80%;
            max-width: 350px;
            z-index: 2; /* Карта спереди */
            filter: drop-shadow(0 0 20px rgba(204, 255, 0, 0.4));
            animation: move3D 7s ease-in-out infinite;
            transform-style: preserve-3d;
            will-change: transform;
        }

        @keyframes move3D {
            0% { transform: rotateY(-20deg) rotateX(10deg) translateY(0); }
            50% { transform: rotateY(20deg) rotateX(-10deg) translateY(-30px); }
            100% { transform: rotateY(-20deg) rotateX(10deg) translateY(0); }
        }
    </style>
</head>
<body>
    <header><div class="logo">ЗАМАЗКА _ViP</div></header>
    <section class="hero">
        <h1>50% <br> РЕЙКБЕК</h1>
        <p>Быстрые выплаты • Моментальные депозиты • Честная игра</p>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-scene">
            <div class="card-bg"></div> <img src="card_only.png" alt="Poker Card" class="card-actor"> </div>
    </section>
</body>
</html>
