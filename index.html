<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* ЕДИНЫЙ ФОН: ФИШКИ НАД ДЫМОМ */
        .main-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            /* Сначала фишки (они сверху), потом дым (он снизу) */
            background: 
                url('ФИШКИ .png') repeat, 
                url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            background-size: 300px, cover; /* Размер для фишек и для дыма отдельно */
            opacity: 0.8;
            animation: chipsFall 40s linear infinite;
        }

        /* Анимируем только фишки (первый фон), дым остается на месте */
        @keyframes chipsFall {
            from { background-position: 0 0, center center; }
            to { background-position: 0 1000px, center center; }
        }

        header { padding: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        .hero { padding: 60px 20px; position: relative; z-index: 10; }

        /* ТВОЙ 3D ЗАГОЛОВОК ИЗ СОХРАНЕНИЯ */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 6px 15px rgba(0,0,0,0.8);
        }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); margin: 30px 0;
        }

        .card-img { 
            width: 90%; max-width: 450px; 
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 30px rgba(204,255,0,0.2));
        }
    </style>
</head>
<body>
    <div class="main-background"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="color: #888; letter-spacing: 5px; font-size: 0.8em;">КРУПНЕЙШИЙ СОЮЗ СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p style="font-size: 1.4em; font-weight: bold; letter-spacing: 3px;">НАЧИНАЕТСЯ ЗДЕСЬ</p>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div>
            <img src="card_only.png" class="card-img">
        </div>
    </section>
</body>
</html>
