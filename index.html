<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; text-align: center; }
        header { padding: 20px; background: #0c0d0c; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: center; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        .hero { padding: 60px 20px; display: flex; flex-direction: column; align-items: center; position: relative; } /* Добавлено position: relative */
        h1 { color: #ccff00; font-size: 3.5em; margin: 0; line-height: 1.1; text-shadow: 0 0 20px rgba(204, 255, 0, 0.3); position: relative; z-index: 2; }
        p { color: #fff; max-width: 600px; margin: 20px auto; font-size: 1.1em; font-weight: 500; letter-spacing: 1px; line-height: 1.5; position: relative; z-index: 2; }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4);
            margin-bottom: 30px;
            position: relative; z-index: 10;
        }
        .hero-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(204, 255, 0, 0.6); }

        /* Контейнер для 3D эффекта и ФОНА ПОД КАРТУ */
        .card-container { 
            perspective: 1200px; 
            width: 100%; 
            max-width: 550px; 
            margin-top: 10px; 
            position: relative; /* Чтобы фон позиционировался относительно контейнера */
            padding: 50px 0; /* Место для фона */
        }
        
        /* НОВЫЙ ЭЛЕМЕНТ: ФОН ПОД КАРТУ (Мягкое свечение) */
        .card-shadow-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Центрирование */
            width: 120%; /* Чуть шире контейнера */
            height: 120%; /* Чуть выше контейнера */
            /* Радиальный градиент: от прозрачного зеленого к черному */
            background: radial-gradient(circle, rgba(204, 255, 0, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%; /* Овальная форма */
            z-index: 1; /* Позади карты */
            filter: blur(20px); /* Размытие для мягкости */
        }

        .hero-img { 
            width: 100%; 
            border: none;
            outline: none;
            filter: drop-shadow(0 0 30px rgba(204, 255, 0, 0.2));
            animation: floatCard 6s ease-in-out infinite; 
            transform-style: preserve-3d;
            position: relative;
            z-index: 2; /* Карта впереди фона */
        }

        @keyframes floatCard {
            0% { transform: rotateY(-15deg) rotateX(5deg) translateY(0px); }
            50% { transform: rotateY(15deg) rotateX(-5deg) translateY(-25px); }
            100% { transform: rotateY(-15deg) rotateX(5deg) translateY(0px); }
        }
    </style>
</head>
<body>
    <header><div class="logo">ЗАМАЗКА _ViP</div></header>
    <section class="hero">
        <span style="color: #666; text-transform: uppercase; letter-spacing: 3px; font-size: 0.9em; position: relative; z-index: 2;">Крупнейший союз СНГ</span>
        <h1 style="margin-top: 10px;">50% <br> РЕЙКБЕК</h1>
        <p>Самые быстрые выплаты • Моментальные депозиты • Честная игра</p>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-container">
            <div class="card-shadow-bg"></div>
            
            <img src="card_only.png" alt="Poker Cards" class="hero-img">
        </div>
    </section>
</body>
</html>
