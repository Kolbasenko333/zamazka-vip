<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* ЕДИНЫЙ СЛОЙ ФОНА ДЛЯ ВСЕГО */
        .universal-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            /* Порядок: 1. Фишки (сверху) | 2. Дым (снизу) */
            background-image: url('ФИШКИ .png'), url('green-smoke-spread-black-background.jpg');
            background-position: 0 0, center center;
            background-repeat: repeat, no-repeat;
            background-size: 350px, cover;
            opacity: 0.9;
            animation: moveOnlyChips 45s linear infinite;
        }

        /* Анимируем только первый слой (фишки), дым (второй слой) стоит на месте */
        @keyframes moveOnlyChips {
            from { background-position: 0 0, center center; }
            to { background-position: 0 1000px, center center; }
        }

        header { padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); position: relative; z-index: 10; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        .hero { padding: 50px 20px; position: relative; z-index: 10; }

        /* ВОЗВРАЩАЕМ ТОТ САМЫЙ ЛИМОННЫЙ 3D ЗАГОЛОВОК ИЗ СОХРАНЕНИЯ */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 15px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 10px 20px rgba(0,0,0,0.8);
        }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 50px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; margin: 30px 0;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        /* КАРТА ТЕПЕРЬ ВСЕГДА ОДНА */
        .card-img { 
            width: 85%; max-width: 420px; 
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 25px rgba(204,255,0,0.3));
        }
    </style>
</head>
<body>
    <div class="universal-bg"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="color: #aaa; text-transform: uppercase; letter-spacing: 5px; font-size: 0.8em;">Крупнейший союз СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p style="font-size: 1.4em; font-weight: bold; letter-spacing: 2px; margin-top: 10px;">НАЧИНАЕТСЯ ЗДЕСЬ</p>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div>
            <img src="card_only.png" class="card-img">
        </div>
        
        <p style="color: #ccff00; font-weight: bold; margin-top: 30px;">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </section>
</body>
</html>
