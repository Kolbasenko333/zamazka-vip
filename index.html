<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. САМЫЙ ЗАДНИЙ ПЛАН — ФИШКИ (z-index: -2) */
        .chips-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('ФИШКИ .png') repeat;
            background-size: 380px;
            z-index: -2;
            opacity: 0.3;
        }

        /* 2. ПЕРЕДНИЙ ПЛАН ФОНА — ДЫМ С АНИМАЦИЕЙ (z-index: -1) */
        /* Он перекрывает фишки, создавая глубину */
        .smoke-layer {
            position: fixed; top: 0; left: 0; width: 200%; height: 100%;
            background: url('green-smoke-spread-black-background.jpg') repeat-x;
            background-size: cover;
            z-index: -1;
            opacity: 0.7;
            animation: smokeMove 30s linear infinite;
        }

        @keyframes smokeMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* КОНТЕНТ */
        .main-content { position: relative; z-index: 10; padding-top: 50px; }

        header { padding: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        /* ВОССТАНОВЛЕННЫЙ 3D ЗАГОЛОВОК */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 15px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 10px 20px rgba(0,0,0,0.8);
        }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 50px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; margin: 30px 0;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        .card-img { 
            width: 80%; max-width: 420px; 
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 25px rgba(204,255,0,0.3));
        }
    </style>
</head>
<body>
    <div class="chips-layer"></div>
    <div class="smoke-layer"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <div class="main-content">
        <div style="color: #aaa; text-transform: uppercase; letter-spacing: 5px; font-size: 0.8em;">КРУПНЕЙШИЙ СОЮЗ СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p style="font-size: 1.4em; font-weight: bold; letter-spacing: 2px;">НАЧИНАЕТСЯ ЗДЕСЬ</p>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div>
            <img src="card_only.png" class="card-img">
        </div>
        
        <p style="color: #ccff00; font-weight: bold; margin-top: 30px;">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </div>
</body>
</html>
