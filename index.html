<!DOCTYPE html>
<html lang="ru"><img src="hero_cards.png?v=999" alt="Poker Card" class="card-actor">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        /* Черный премиальный фон всего сайта */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; text-align: center; }
        header { padding: 20px; background: #0c0d0c; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        
        .hero { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        h1 { color: #ccff00; font-size: clamp(2.5em, 10vw, 3.5em); margin: 0; line-height: 1.1; z-index: 2; }
        p { color: #fff; max-width: 600px; margin: 20px auto; font-size: 1.1em; font-weight: 500; z-index: 2; }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); margin-bottom: 30px;
            position: relative; z-index: 10;
        }

        /* КОНТЕЙНЕР СЦЕНЫ */
        .card-scene {
            position: relative; width: 100%; max-width: 600px; height: 450px;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px;
        }

        /* 1. ВИРТУАЛЬНЫЙ ТУМАН (Создаем кодом под картой) */
        .fog-effect {
            position: absolute; width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(204, 255, 0, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(60px); z-index: 1; pointer-events: none;
        }

        /* 2. ПАРЯЩАЯ КАРТА */
        .card-actor {
            width: 100%; max-width: 550px; /* Увеличил размер */
            z-index: 2;
            /* УБИРАЕМ ЧЕРНУЮ РАМКУ: mix-blend-mode делает черный цвет прозрачным */
            mix-blend-mode: screen; 
            /* Добавляем мягкое неоновое свечение самой карте */
            filter: drop-shadow(0 0 30px rgba(204, 255, 0, 0.3));
            animation: move3D 8s ease-in-out infinite;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* ЭФФЕКТНОЕ 3D ДВИЖЕНИЕ */
        @keyframes move3D {
            0% { transform: rotateY(-25deg) rotateX(10deg) scale(1); }
            50% { transform: rotateY(25deg) rotateX(-10deg) scale(1.05) translateY(-20px); }
            100% { transform: rotateY(-25deg) rotateX(10deg) scale(1); }
        }
    </style>
</head>
<body>
    <header><div class="logo">ЗАМАЗКА _ViP</div></header>
    <section class="hero">
        <h1>50% <br> РЕЙКБЕК</h1>
        <p>Быстрые выплаты • Депозиты 24/7 • Честная игра</p>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-scene">
            <div class="fog-effect"></div>
            <img src="hero_cards.png" alt="Poker Card" class="card-actor">
        </div>
    </section>
</body>
</html>
