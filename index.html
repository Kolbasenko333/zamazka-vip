<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. ФОНОВЫЕ СЛОИ (РАЗДЕЛЯЕМ, ЧТОБЫ НЕ БЫЛО ЧЕРНОГО ЭКРАНА) */
        .smoke-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            z-index: -2;
        }

        .chips-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('ФИШКИ .png') center/cover no-repeat;
            z-index: -1;
            mix-blend-mode: screen; 
            opacity: 0.4; /* Делаем фишки фоном, а не главным элементом */
        }

        header { padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; text-shadow: 0 0 10px rgba(204,255,0,0.5); }

        .hero { padding: 40px 20px; position: relative; z-index: 10; }

        /* 2. ЗАГОЛОВОК: ВОЗВРАЩАЕМ МОЩНЫЙ 3D */
        h1 { 
            font-size: 4.2em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            color: #ccff00;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 10px 20px rgba(0,0,0,0.8);
        }

        .sub-text { font-size: 1.4em; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        
        /* ПОДНЯЛИ ЯРКОСТЬ СЕРЫХ БУКВ */
        .features { color: #eee; font-size: 1em; margin-bottom: 30px; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* 3. КНОПКА: СПОКОЙНЫЙ ПЕРЕЛИВ */
        .hero-btn { 
            display: inline-block; 
            background: linear-gradient(90deg, #ccff00, #00FF7F, #ccff00);
            background-size: 200% auto;
            color: #000; padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.5);
            animation: moveGradient 4s linear infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* 4. КАРТА: УБИРАЕМ ЛЮБЫЕ КВАДРАТЫ */
        .card-img { 
            width: 85%; max-width: 400px; margin-top: 20px;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 20px rgba(204, 255, 0, 0.4));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .rb-text { color: #ccff00; font-weight: bold; margin-top: 40px; font-size: 1.2em; text-shadow: 0 0 10px rgba(204,255,0,0.5); }
    </style>
</head>
<body>
    <div class="smoke-bg"></div>
    <div class="chips-bg"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="color: #ccc; text-transform: uppercase; letter-spacing: 4px; font-size: 0.8em; margin-bottom: 5px;">КРУПНЕЙШИЙ СОЮЗ СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">НАЧИНАЕТСЯ ЗДЕСЬ</p>
        <div class="features">Быстрые выплаты • Моментальные депозиты • Честная игра</div>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div>
            <img src="card_only.png" class="card-img">
        </div>
        
        <p class="rb-text">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </section>
</body>
</html>
