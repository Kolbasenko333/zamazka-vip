<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. ДЫМ — САМЫЙ НИЖНИЙ СЛОЙ. СТАТИЧЕН. */
        .smoke-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat fixed;
            z-index: -2; /* Самый задний план */
            opacity: 0.8;
        }

        /* 2. ФИШКИ — ЛЕТЯТ ПЕРЕД ДЫМОМ, НО ПОД ТЕКСТОМ */
        .chips-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('ФИШКИ .png') repeat;
            background-size: 320px; 
            z-index: -1; /* Выше дыма, ниже контента */
            mix-blend-mode: screen; 
            opacity: 0.25;
            animation: chipsRain 45s linear infinite;
        }

        @keyframes chipsRain {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        header { 
            padding: 20px; background: rgba(12, 13, 12, 0.7); 
            border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); 
        }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        .hero { padding: 60px 20px; position: relative; z-index: 10; }

        /* ВОЗВРАЩАЕМ ТОТ САМЫЙ 3D ЗАГОЛОВОК */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 
                0 2px 0 #779900, 
                0 3px 0 #668800, 
                0 4px 0 #557700, 
                0 6px 15px rgba(0,0,0,0.8), 
                0 0 30px rgba(204,255,0,0.4);
        }

        .sub-text { font-size: 1.4em; color: #fff; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .features { color: #888; font-size: 1em; margin-bottom: 30px; letter-spacing: 1px; }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); margin-bottom: 40px;
        }

        .card-img { 
            width: 100%; max-width: 500px;
            mix-blend-mode: screen; opacity: 0.8;
            filter: drop-shadow(0 0 30px rgba(204, 255, 0, 0.2));
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: rotateY(-15deg) translateY(0); }
            50% { transform: rotateY(15deg) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="smoke-layer"></div>
    <div class="chips-layer"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="color: #888; text-transform: uppercase; letter-spacing: 5px; font-size: 0.8em; margin-bottom: 10px;">Крупнейший союз СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">Начинается здесь</p>
        <div class="features">Быстрые выплаты • Моментальные депозиты • Честная игра</div>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-container">
            <img src="card_only.png" class="card-img">
        </div>
        
        <p style="color: #ccff00; font-weight: bold; margin-top: 30px; letter-spacing: 1px;">
            + 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ
        </p>
    </section>
</body>
</html>
