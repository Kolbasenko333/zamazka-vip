<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; text-align: center; }
        header { padding: 20px; background: #0c0d0c; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: center; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        .hero { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        h1 { color: #ccff00; font-size: 3.5em; margin: 0; line-height: 1.1; text-shadow: 0 0 20px rgba(204, 255, 0, 0.3); z-index: 2; }
        p { color: #fff; max-width: 600px; margin: 20px auto; font-size: 1.1em; font-weight: 500; letter-spacing: 1px; z-index: 2; }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4);
            margin-bottom: 30px;
            position: relative; z-index: 10;
        }
        .hero-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(204, 255, 0, 0.6); }

        /* УВЕЛИЧЕННЫЙ КОНТЕЙНЕР */
        .card-container { 
            perspective: 1500px; 
            width: 100%; 
            max-width: 700px; /* Увеличил ширину контейнера */
            margin-top: 0px; 
            position: relative;
            padding: 40px 0;
        }
        
        .card-shadow-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, rgba(204, 255, 0, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(40px);
        }

        .hero-img { 
            width: 95%; /* Теперь карта занимает почти всю ширину контейнера */
            max-width: 500px; /* Было 350px, теперь 500px — она стала ощутимо больше */
            border: none;
            outline: none;
            filter: drop-shadow(0 0 40px rgba(204, 255, 0, 0.25));
            animation: floatCard 6s ease-in-out infinite; 
            transform-style: preserve-3d;
            position: relative;
            z-index: 2;
        }

        @keyframes floatCard {
            0% { transform: rotateY(-15deg) rotateX(5deg) translateY(0px); }
            50% { transform: rotateY(15deg) rotateX(-5deg) translateY(-30px); }
            100% { transform: rotateY(-15deg) rotateX(5deg) translateY(0px); }
        }
    </style>
</head>
<body>
    <header><div class="logo">ЗАМАЗКА _ViP</div></header>
    <section class="hero">
        <span style="color: #666; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8em; z-index: 2;">Крупнейший союз СНГ</span>
        <h1 style="margin-top: 10px;">50% <br> РЕЙКБЕК</h1>
        <p>Быстрые выплаты • Моментальные депозиты • Честная игра</p>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-container">
            <div class="card-shadow-bg"></div>
            <img src="card_only.png" onerror="this.src='hero_cards.png'" alt="Poker Cards" class="hero-img">
        </div>
    </section>
</body>
</html>
