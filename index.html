<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        /* Базовые настройки */
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; overflow-x: hidden; }

        /* 1. ДЫМ — САМЫЙ ЗАДНИЙ ПЛАН (z-index: -2) */
        .smoke-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            z-index: -2;
            opacity: 0.8;
        }

        /* 2. ФИШКИ — ВПЕРЕДИ ДЫМА (z-index: -1) */
        .chips-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('ФИШКИ .png') repeat;
            background-size: 300px;
            z-index: -1;
            mix-blend-mode: screen;
            opacity: 0.2;
            animation: fall 40s linear infinite;
        }

        @keyframes fall {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* КОНТЕНТ (z-index: 10 по умолчанию) */
        .hero { padding: 60px 20px; position: relative; }

        /* ВОССТАНОВЛЕННЫЙ 3D ЗАГОЛОВОК */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 6px 15px rgba(0,0,0,0.8);
        }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; margin: 30px 0;
        }

        .card-img { width: 90%; max-width: 450px; mix-blend-mode: screen; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="smoke-layer"></div>
    <div class="chips-layer"></div>

    <section class="hero">
        <div style="color: #888; letter-spacing: 5px;">КРУПНЕЙШИЙ СОЮЗ СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        <div>
            <img src="card_only.png" class="card-img">
        </div>
    </section>
</body>
</html>
