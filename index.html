<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. ДЫМ — САМЫЙ ЗАДНИЙ СЛОЙ (z-index: -2) */
        .smoke-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            z-index: -2;
            opacity: 0.9;
        }

        /* 2. ФИШКИ — ПОВЕРХ ДЫМА (z-index: -1) */
        .chips-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('ФИШКИ .png') repeat;
            background-size: 350px; 
            z-index: -1;
            mix-blend-mode: screen; 
            opacity: 0.2;
            animation: chipsRain 40s linear infinite;
        }

        @keyframes chipsRain {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* 3. КОНТЕНТ — ВСЕГДА СВЕРХУ (z-index: 10) */
        .main-content {
            position: relative;
            z-index: 10;
            padding-top: 50px;
        }

        header { padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        /* ТВОЙ ЛЮБИМЫЙ 3D ЗАГОЛОВОК */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 15px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 10px 20px rgba(0,0,0,0.8);
        }

        .sub-text { font-size: 1.4em; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }

        .btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 50px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        /* КАРТА ТЕПЕРЬ ОДНА, А НЕ ФОНОМ */
        .card-img { 
            width: 80%; max-width: 400px; margin-top: 40px;
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 25px rgba(204,255,0,0.3));
        }
    </style>
</head>
<body>
    <div class="smoke-bg"></div>
    <div class="chips-bg"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <div class="main-content">
        <div style="color: #aaa; text-transform: uppercase; letter-spacing: 5px; font-size: 0.8em; margin-bottom: 10px;">Крупнейший союз СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">Начинается здесь</p>
        
        <a href="https://t.me/zamazka_vip_bot" class="btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div>
            <img src="card_only.png" class="card-img">
        </div>
        
        <p style="color: #ccff00; font-weight: bold; margin-top: 30px;">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </div>
</body>
</html>
