<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; text-align: center; }
        header { padding: 20px; background: #0c0d0c; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        
        .hero { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #ccff00; font-size: 3.5em; margin: 0; line-height: 1.1; }
        p { color: #fff; max-width: 600px; margin: 20px auto; font-size: 1.1em; font-weight: 500; }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); margin-bottom: 30px;
        }

        .card-scene {
            position: relative; width: 100%; max-width: 600px; height: 400px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
        }

        .card-actor {
            width: 100%; max-width: 520px; /* Увеличил саму карту */
            mix-blend-mode: screen; /* Убирает черный фон вокруг карты */
            filter: drop-shadow(0 0 30px rgba(204, 255, 0, 0.25));
            animation: move3D 7s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes move3D {
            0% { transform: rotateY(-20deg) rotateX(10deg); }
            50% { transform: rotateY(20deg) rotateX(-10deg) translateY(-25px); }
            100% { transform: rotateY(-20deg) rotateX(10deg); }
        }
    </style>
</head>
