<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow: hidden; 
        }

        /* 1. ДЫМ — САМЫЙ НИЖНИЙ ПЛАН. ОН ЗАФИКСИРОВАН И НЕ ДВИГАЕТСЯ. */
        .smoke-back {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('green-smoke-spread-black-background.jpg') center center / cover no-repeat;
            z-index: -5; /* Уходим максимально глубоко */
        }

        /* 2. ФИШКИ — ЛЕТЯТ ПЕРЕД ДЫМОМ. */
        .chips-front {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('ФИШКИ .png') repeat;
            background-size: 350px; /* Размер фишек как на удачных скринах */
            z-index: -4; /* Выше дыма, но под текстом */
            opacity: 0.15; /* Делаем их едва заметными, чтобы не рябило */
            mix-blend-mode: screen; /* Убирает черные границы у фишек */
            animation: moveChips 40s linear infinite;
        }

        @keyframes moveChips {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        header { padding: 20px; position: relative; z-index: 10; background: rgba(0,0,0,0.4); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        .hero { padding: 40px 20px; position: relative; z-index: 10; }

        /* ТВОЙ ТОТ САМЫЙ 3D ЗАГОЛОВОК */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 10px 20px rgba(0,0,0,0.8);
        }

        .sub-text { font-size: 1.4em; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 50px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.4);
        }

        .card-container { margin-top: 30px; }
        .card-img { 
            width: 80%; max-width: 420px; 
            mix-blend-mode: screen; 
            opacity: 0.7;
            filter: drop-shadow(0 0 20px rgba(204,255,0,0.3));
        }
    </style>
</head>
<body>
    <div class="smoke-back"></div>

        <div class="card-container">
            <img src="card_only.png" class="card-img">

        <p style="color: #ccff00; font-weight: bold; margin-top: 30px; text-transform: uppercase;">

        </p>
    </section>
</body>
</html>
