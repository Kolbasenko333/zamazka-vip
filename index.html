<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP | Официальный клуб</title>
    <style>
        :root { --main-color: #ccff00; --bg-dark: #050505; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg-dark); color: #fff; 
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; 
            overflow-x: hidden; 
        }

        /* ХЕДЕР В СТИЛЕ POKERSTARS */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); position: fixed; width: 100%; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(204, 255, 0, 0.1);
        }

        .nav-links a { color: #fff; text-decoration: none; margin-right: 20px; font-weight: 500; font-size: 0.9em; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--main-color); }

        .auth-btns .login { color: #fff; text-decoration: none; margin-right: 20px; font-weight: bold; }
        .auth-btns .reg-btn { 
            background: var(--main-color); color: #000; padding: 10px 25px; 
            border-radius: 50px; text-decoration: none; font-weight: bold;
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
        }

        /* ФОНОВЫЕ СЛОИ */
        .smoke-bg {
            position: fixed; inset: 0; z-index: -1;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            opacity: 0.6; filter: hue-rotate(10deg);
        }

        /* ГЛАВНЫЙ БЛОК */
        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative;
        }

        h1 { 
            font-size: 5em; text-transform: uppercase; font-weight: 900; 
            margin: 0; line-height: 0.85; color: var(--main-color);
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* СЕКЦИЯ ПРЕДЛОЖЕНИЙ (КАК НА СКРИНЕ) */
        .promo-section {
            background: #fff; color: #000; padding: 60px 20px;
            text-align: center; border-radius: 40px 40px 0 0;
        }

        .promo-title { font-size: 2em; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo" style="color: var(--main-color); font-weight: 900; letter-spacing: 2px;">VIP</div>
    <nav class="nav-links">
        <a href="#">ГЛАВНАЯ</a>
        <a href="#">КЭШ-ИГРЫ</a>
        <a href="#">ТУРНИРЫ</a>
        <a href="#">АКЦИИ</a>
    </nav>
    <div class="auth-btns">
        <a href="#" class="login">ВХОД</a>
        <a href="#" class="reg-btn">РЕГИСТРАЦИЯ</a>
    </div>
</header>

<div class="smoke-bg"></div>

<section class="hero">
    <div style="letter-spacing: 8px; font-size: 0.9em; margin-bottom: 10px;">ДОБРО ПОЖАЛОВАТЬ В</div>
    <h1>VIP <br> POKER</h1>
    <a href="https://t.me/zamazka_vip_bot" style="margin-top: 40px;" class="reg-btn">ИГРАТЬ В TELEGRAM</a>
</section>

<section class="promo-section">
    <div class="promo-title">Предложения для новых игроков</div>
    <p>После регистрации воспользуйтесь одним из наших бонусов за первый депозит!</p>
    </section>

</body>
</html>
