<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden; 
            text-align: center; 
        }

        /* ТВОЙ ЗЕЛЕНЫЙ ДЫМ НА ФОН */
        .full-bg-smoke {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('green-smoke-spread-black-background.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.4; 
            z-index: -1;
            filter: brightness(0.6);
        }

        header { padding: 20px; background: rgba(12, 13, 12, 0.7); border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        
        .hero { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 10; }
        h1 { color: #ccff00; font-size: 3.5em; margin: 0; line-height: 1.1; text-shadow: 0 0 20px rgba(204, 255, 0, 0.3); }
        p { color: #fff; max-width: 600px; margin: 20px auto; font-size: 1.1em; font-weight: 500; }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); margin-bottom: 40px;
        }

        /* КАРТА БЕЗ РАМОК */
        .card-container {
            perspective: 1500px;
            width: 100%;
            max-width: 600px;
            display: flex; justify-content: center;
        }

        .card-actor {
            width: 95%;
            max-width: 500px;
            /* Эта магия убирает черный фон картинки */
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 40px rgba(204, 255, 0, 0.4));
            animation: float3D 8s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes float3D {
            0% { transform: rotateY(-15deg) rotateX(8deg); }
            50% { transform: rotateY(15deg) rotateX(-8deg) translateY(-20px); }
            100% { transform: rotateY(-15deg) rotateX(8deg); }
        }
    </style>
</head>
<body>
    <div class="full-bg-smoke"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>
    
    <section class="hero">
        <h1>50% <br> РЕЙКБЕК</h1>
        <p>Быстрые выплаты • Депозиты 24/7 • Честная игра</p>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-container">
            <img src="hero_cards.png" alt="Poker Card" class="card-actor">
        </div>
    </section>
</body>
</html>
