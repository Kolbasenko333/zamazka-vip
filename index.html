<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; color: #fff; margin: 0; overflow: hidden; text-align: center; }
        header { padding: 20px; background: #0c0d0c; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        .hero { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #ccff00; font-size: 3.5em; margin: 0; line-height: 1.1; }
        p { color: #fff; margin: 20px auto; font-size: 1.1em; font-weight: 500; }
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; box-shadow: 0 0 25px rgba(204, 255, 0, 0.4);
        }
        .card-scene {
            position: relative; width: 100%; max-width: 500px; height: 350px;
            display: flex; justify-content: center; align-items: center; perspective: 1200px;
        }
        .card-actor {
            width: 90%; max-width: 350px; mix-blend-mode: screen; 
            filter: drop-shadow(0 0 30px rgba(204, 255, 0, 0.4));
            animation: move3D 6s ease-in-out infinite; transform-style: preserve-3d;
        }
        @keyframes move3D {
            0% { transform: rotateY(-15deg) rotateX(10deg) translateY(0); }
            50% { transform: rotateY(15deg) rotateX(-10deg) translateY(-20px); }
            100% { transform: rotateY(-15deg) rotateX(10deg) translateY(0); }
        }
    </style>
</head>
<body>
    <header><div class="logo">ЗАМАЗКА _ViP</div></header>
    <section class="hero">
        <h1>50% <br> РЕЙКБЕК</h1>
        <p>Быстрые выплаты • Депозиты 24/7 • Честная игра</p>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        <div class="card-scene">
            <img src="card_only.png" onerror="this.src='hero_cards.png'" alt="Poker Card" class="card-actor">
        </div>
    </section>
</body>
</html>
