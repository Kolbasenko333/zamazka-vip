<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; text-align: center; }
        
        /* ФОН С ДЫМОМ */
        .full-bg-smoke {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('green-smoke-spread-black-background.jpg');
            background-size: cover; background-position: center;
            opacity: 0.3; z-index: -1; filter: brightness(0.4);
        }

        header { padding: 20px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }
        
        .hero { padding: 40px 20px; position: relative; z-index: 10; }
        h1 { color: #ccff00; font-size: 3.5em; margin: 0; text-shadow: 0 0 15px rgba(204, 255, 0, 0.4); }
        
        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; margin: 30px 0;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.5);
        }

        /* КОНТЕЙНЕР ДЛЯ КАРТЫ */
        .card-box {
            perspective: 1000px;
            display: flex; justify-content: center;
            margin-top: -20px; /* Немного наезжаем на кнопку для стиля */
        }

        .card-actor {
            width: 90%; max-width: 500px;
            /* ЖЕСТКОЕ УДАЛЕНИЕ ФОНА */
            mix-blend-mode: lighten; 
            filter: contrast(1.1) brightness(1.1) drop-shadow(0 0 30px rgba(204,255,0,0.6));
            animation: fly 6s ease-in-out infinite;
        }

        @keyframes fly {
            0%, 100% { transform: rotateY(-15deg) rotateX(5deg) translateY(0); }
            50% { transform: rotateY(15deg) rotateX(-5deg) translateY(-25px); }
        }
    </style>
</head>
<body>
    <div class="full-bg-smoke"></div>
    <header><div class="logo">ЗАМАЗКА _ViP</div></header>
    <section class="hero">
        <h1>50% <br> РЕЙКБЕК</h1>
        <p>Быстрые выплаты • Депозиты 24/7 • Честная игра</p>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        <div class="card-box">
            <img src="hero_cards.png" class="card-actor">
        </div>
    </section>
</body>
</html>
