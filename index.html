<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. УБИТА АНИМАЦИЯ ДЫМУ, ОН СЗАДИ */
        .smoke-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat fixed;
            opacity: 0.8;
            /* Анимация удалена !!! Дым стоит на месте. */
        }

        /* 2. ФИШКИ ВПЕРЕДИ И АНИМИРОВАНЫ (ПАДАЮТ) */
        .falling-chips {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            /* Используем твой файл фишек для фонового дождя */
            background: url('ФИШКИ .png') repeat;
            background-size: 350px; /* Делаем фишки мелкими и стильными */
            opacity: 0.15;
            mix-blend-mode: screen; /* Прячем черный фон фишек */
            /* Бесконечное падение фишек */
            animation: chipsFallVertical 40s linear infinite;
        }

        @keyframes chipsFallVertical {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        header { padding: 25px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo { font-size: 1.4em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        .hero { padding: 40px 20px; position: relative; z-index: 10; }

        /* ТВОЙ МОЩНЫЙ 3D ЗАГОЛОВОК ИЗ ТОЧКИ СОХРАНЕНИЯ */
        h1 { 
            font-size: 4.5em; margin: 15px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            color: #ccff00;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 6px 15px rgba(0,0,0,0.8);
        }

        .sub-text { font-size: 1.4em; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        .features { color: #eee; font-size: 1em; margin-bottom: 25px; opacity: 0.9; }

        /* КНОПКА С ПЕРЕЛИВОМ (ТУСКЛЫМ ИЗУМРУДОМ) */
        .hero-btn { 
            display: inline-block; 
            background: linear-gradient(90deg, #00FF7F, #00fac4, #00FF7F);
            background-size: 200% auto;
            color: #000; padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 255, 127, 0.4);
            animation: btnHue 4s linear infinite;
        }

        @keyframes btnHue {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* КАРТА: БЕЗ РАМОК И КВАДРАТОВ */
        .card-container { margin-top: 30px; display: flex; justify-content: center; }
        .card-img { 
            width: 80%; max-width: 400px;
            mix-blend-mode: screen; /* !!! Растворяет черный фон картинки */
            opacity: 0.6; /* Добавили прозрачности по твоей просьбе */
            filter: drop-shadow(0 0 25px rgba(204, 255, 0, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .rb-text { color: #ccff00; font-weight: bold; margin-top: 30px; font-size: 1.1em; text-transform: uppercase; }
    </style>
</head>

    <div class="falling-chips"></div>
