<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: Arial, sans-serif; text-align: center; overflow-x: hidden; 
        }

        /* 1. СЛОЙ ДЫМА (САМЫЙ НИЖНИЙ) */
        .layer-smoke {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            z-index: -10; /* Улетает максимально назад */
        }

        /* 2. СЛОЙ ФИШЕК (ПЕРЕД ДЫМОМ) */
        .layer-chips {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('ФИШКИ .png') repeat;
            background-size: 350px;
            z-index: -5; /* Выше дыма, но под текстом */
            opacity: 0.2;
            mix-blend-mode: screen;
            animation: chipsMove 40s linear infinite;
        }

        @keyframes chipsMove {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* 3. КОНТЕНТ (ВСЕГДА СВЕРХУ) */
        .main-container { position: relative; z-index: 10; padding-top: 50px; }

        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900;
            text-shadow: 0 1px 0 #88aa00, 0 2px 0 #779900, 0 4px 0 #557700, 0 10px 20px rgba(0,0,0,0.8);
        }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 50px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; margin: 30px 0;
        }

        .card-img { width: 80%; max-width: 400px; mix-blend-mode: screen; }
    </style>
</head>
<body>
    <div class="layer-smoke"></div>
    <div class="layer-chips"></div>

    <div class="main-container">
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        <div>
            <img src="card_only.png" class="card-img">
        </div>
    </div>
</body>
</html>
