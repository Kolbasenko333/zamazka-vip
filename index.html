<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; }

        /* 1. ФОН: ОБЪЕДИНЯЕМ ДЫМ И ТВОИ ФИШКИ (Без изменений) */
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('ФИШКИ .png') center/cover no-repeat, url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            mix-blend-mode: screen; 
            opacity: 0.6; 
        }

        .content { position: relative; z-index: 10; padding: 60px 20px; }
        
        /* 2. ШАПКА: СДЕЛАЛИ ЯРЧЕ */
        .logo-header { color: #ccff00; font-size: 1.5em; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 15px rgba(204, 255, 0, 0.7); }

        /* 3. ЗАГОЛОВОК: БЫЛ ЖЕЛТЫМ, СТАЛ ГРАДИЕНТНЫМ (МЕНЯЕТ ЦВЕТ) */
        h1 { 
            font-size: 4.5em; margin: 10px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            /* !!! МАГИЯ ГРАДИЕНТА !!! */
            background: linear-gradient(90deg, #ccff00, #00FF7F, #ccff00);
            background-size: 200% auto;
            -webkit-background-clip: text; /* Отрезает фон по форме букв */
            -webkit-text-fill-color: transparent; /* Делает сам текст прозрачным */
            
            /* Яркое неоновое свечение */
            text-shadow: 0 0 25px rgba(204, 255, 0, 0.5);
            /* Запускает перелив заголовка */
            animation: hueMove 4s linear infinite;
        }

        .features { color: #aaa; font-size: 1em; margin-bottom: 20px; letter-spacing: 1px; }

        /* 4. КНОПКА (ПЕРЕЛИВАЮЩАЯСЯ) */
        .hero-btn { 
            display: inline-block; 
            /* !!! МАГИЯ ГРАДИЕНТА ДЛЯ КНОПКИ !!! */
            background: linear-gradient(90deg, #ccff00, #00FF7F, #00fac4, #ccff00);
            background-size: 200% auto;
            color: #000; padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            /* Мощное неоновое свечение кнопки */
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.7);
            margin-bottom: 40px;
            /* Запускает перелив кнопки */
            animation: hueMove 4s linear infinite;
        }
        .hero-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(204, 255, 0, 0.9); }

        /* 5. КАРТА (АТМОСФЕРНАЯ) */
        .card-img { 
            width: 80%; max-width: 450px; mix-blend-mode: screen; 
            /* Сделали ярче и увеличили свечение */
            filter: contrast(0.9) brightness(1.1) drop-shadow(0 0 30px rgba(204, 255, 0, 0.3));
        }

        /* ОПИСАНИЕ АНИМАЦИИ: Двигаем градиент слева направо */
        @keyframes hueMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
    </style>
</head>
<body>
    <div class="main-bg"></div>
    <div class="content">
        <div class="logo-header">ЗАМАЗКА _ViP</div>
        
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        
        <p style="color: #fff; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px;">Начинается здесь</p>
        <div class="features">Быстрые выплаты • Моментальные депозиты • Честная игра</div>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div>
            <img src="hero_cards.png" class="card-img">
        </div>
        
        <p style="color: #ccff00; font-weight: bold; margin-top: 30px; letter-spacing: 1px;">
            + 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ
        </p>
    </section>
</body>
</html>
