<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #050a05; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. ЕДИНЫЙ ФОН: ДЫМ */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            opacity: 0.7;
        }

        /* 2. ПАДАЮЩИЕ ФИШКИ (МЕЛКИЕ И ЧИСТЫЕ) */
        .falling-chips {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('ФИШКИ .png') repeat;
            background-size: 400px; /* Сделали фишки мелкими и стильными */
            opacity: 0.15;
            mix-blend-mode: screen;
            animation: chipsFall 30s linear infinite;
        }

        @keyframes chipsFall {
            from { background-position: 0 0; }
            to { background-position: 400px 800px; }
        }

        header { padding: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); }
        .logo { font-size: 1.3em; font-weight: bold; color: #fff; letter-spacing: 4px; text-transform: uppercase; }

        .hero { padding: 50px 20px; position: relative; z-index: 10; }

        /* 3. ЗАГОЛОВОК: ПРЕМИАЛЬНЫЙ ИЗУМРУД */
        h1 { 
            font-size: 4.2em; margin: 15px 0; line-height: 0.95; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            color: #00FF7F; /* Изумрудный */
            text-shadow: 
                0 0 20px rgba(0, 255, 127, 0.5),
                0 10px 20px rgba(0,0,0,0.6);
        }

        .sub-text { font-size: 1.3em; font-weight: bold; letter-spacing: 5px; margin-bottom: 5px; }
        .features { color: #ccc; font-size: 0.95em; margin-bottom: 35px; opacity: 0.9; }

        /* 4. КНОПКА: ПЕРЕЛИВАЮЩИЙСЯ ГРАДИЕНТ */
        .hero-btn { 
            display: inline-block; 
            background: linear-gradient(90deg, #00FF7F, #00fac4, #00FF7F);
            background-size: 200% auto;
            color: #000; padding: 18px 45px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 25px rgba(0, 255, 127, 0.4);
            animation: btnMove 4s linear infinite;
            transition: 0.3s;
        }
        .hero-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 255, 127, 0.6); }

        @keyframes btnMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* 5. КАРТА: ЧИСТАЯ, БЕЗ КВАДРАТОВ */
        .card-wrap { margin-top: 30px; }
        .card-img { 
            width: 75%; max-width: 380px;
            mix-blend-mode: screen; /* Убирает черный фон */
            opacity: 0.65;
            filter: drop-shadow(0 0 20px rgba(0, 255, 127, 0.2));
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        .rb-footer { color: #00FF7F; font-weight: bold; margin-top: 40px; letter-spacing: 1px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="falling-chips"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="font-size: 0.75em; letter-spacing: 6px; margin-bottom: 10px; opacity: 0.7;">КРУПНЕЙШИЙ СОЮЗ СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">НАЧИНАЕТСЯ ЗДЕСЬ</p>
        <div class="features">Быстрые выплаты • Моментальные депозиты • Честная игра</div>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-wrap">
            <img src="card_only.png" class="card-img">
        </div>
        
        <p class="rb-footer">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </section>
</body>
</html>
