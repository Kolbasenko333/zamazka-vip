<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP | Покерный Клуб</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        .chips-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('ФИШКИ .png') center/cover no-repeat;
            z-index: -2; opacity: 0.4;
        }

        .smoke-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            z-index: -1; mix-blend-mode: screen; opacity: 0.8;
            animation: smokePulse 20s ease-in-out infinite;
        }

        @keyframes smokePulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }

        header { padding: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 5px; }

        .hero { padding: 30px 20px; position: relative; z-index: 10; }

        h1 { 
            font-size: 3.5em; margin: 5px 0; line-height: 0.95; 
            text-transform: uppercase; font-weight: 900;
            color: #ccff00;
            text-shadow: 0 10px 25px rgba(0,0,0,0.9);
        }

        .sub-text { font-size: 1.2em; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        /* ГЛАВНАЯ КНОПКА (ТГ БОТ) */
        .hero-btn { 
            display: inline-block; 
            background: linear-gradient(90deg, #ccff00, #00FF7F, #ccff00);
            background-size: 200% auto;
            color: #000; padding: 20px 50px; border-radius: 50px; text-decoration: none; 
            font-weight: 900; text-transform: uppercase; font-size: 1.2em;
            box-shadow: 0 0 40px rgba(204, 255, 0, 0.5);
            animation: moveGradient 4s linear infinite;
            margin-bottom: 35px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* КНОПКИ ВК И НОВЫЙ ВАТСАП */
        .social-container {
            margin-bottom: 40px;
            display: flex; justify-content: center; gap: 25px;
        }

        .social-item {
            text-decoration: none; width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ccff00; transition: all 0.3s ease;
            color: #ccff00; font-size: 28px;
        }

        .social-item:hover { transform: scale(1.1); color: #000; background: #ccff00; box-shadow: 0 0 20px #ccff00; }

        /* ПОДДЕРЖКА / ЖАЛОБЫ */
        .support-btn {
            display: inline-block;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 12px 30px; border-radius: 5px;
            text-decoration: none; font-size: 0.85em; font-weight: bold;
            text-transform: uppercase; transition: all 0.3s;
            margin-top: 20px;
            opacity: 0.7;
        }

        .support-btn:hover { border-color: #ff4444; color: #ff4444; opacity: 1; }

        .card-img { 
            width: 70%; max-width: 300px; margin: 20px 0;
            mix-blend-mode: screen; opacity: 0.8;
        }

        .rb-text { color: #ccff00; font-weight: bold; font-size: 1em; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="chips-bg"></div>
    <div class="smoke-bg"></div>

    <header><div class="logo">VIP</div></header>

    <section class="hero">
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">Крупнейший союз СНГ</p>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🔥 ВСТУПИТЬ В КЛУБ</a>

        <div class="social-container">
            <a href="https://vk.ru/ppp_zmz5" class="social-item" target="_blank">
                <i class="fa-brands fa-vk"></i>
            </a>
            <a href="https://wa.me/message/PP2SIOH74T3ZH1" class="social-item" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </div>

        <div>
            <img src="card_only.png" class="card-img">
        </div>

        <p class="rb-text">Максимальный рейкбек гарантирован</p>
        
        <br>
        <a href="https://t.me/kosha101" class="support-btn">
            <i class="fa-solid fa-headset"></i> Поддержка и жалобы
        </a>
    </section>
</body>
</html>
