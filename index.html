<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. ФОН: ДЫМ */
        .smoke-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: url('green-smoke-spread-black-background.jpg') center/cover no-repeat;
            opacity: 0.8;
        }

        /* 2. ПАДАЮЩИЕ ФИШКИ (Исправлено: мелкие и аккуратные) */
        .falling-chips {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('ФИШКИ .png') center/500px repeat; /* Сделали их меньше */
            opacity: 0.2;
            mix-blend-mode: screen;
            animation: chipsFall 40s linear infinite;
        }

        @keyframes chipsFall {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        header { padding: 20px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .logo { font-size: 1.2em; font-weight: bold; color: #fff; letter-spacing: 3px; opacity: 0.9; }

        .hero { padding: 40px 20px; position: relative; z-index: 10; }

        /* 3. ЗАГОЛОВОК: ИЗУМРУДНЫЙ ПРЕМИУМ */
        h1 { 
            font-size: 4em; margin: 10px 0; line-height: 1; 
            text-transform: uppercase; font-weight: 900;
            color: #00FF7F;
            /* Глубокая тень для объема без лагов */
            text-shadow: 0 0 20px rgba(0, 255, 127, 0.6), 0 5px 15px rgba(0,0,0,0.5);
        }

        .sub-text { font-size: 1.2em; font-weight: bold; letter-spacing: 4px; margin-bottom: 5px; opacity: 0.9; }
        .features { color: #ccc; font-size: 0.9em; margin-bottom: 30px; }

        /* 4. КНОПКА: ПЕРЕЛИВ */
        .hero-btn { 
            display: inline-block; 
            background: linear-gradient(90deg, #00FF7F, #00fac4, #00FF7F);
            background-size: 200% auto;
            color: #000; padding: 16px 40px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.4);
            animation: btnMove 3s linear infinite;
        }

        @keyframes btnMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* 5. КАРТА: УБИРАЕМ ЧЕРНЫЙ КВАДРАТ */
        .card-box {
            margin-top: 20px;
            display: flex; justify-content: center;
        }

        .card-img { 
            width: 70%; max-width: 350px;
            mix-blend-mode: screen; /* Убирает черный фон вокруг карты */
            opacity: 0.7;
            filter: drop-shadow(0 0 20px rgba(0, 255, 127, 0.3));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .rb-text { color: #00FF7F; font-weight: bold; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="smoke-bg"></div>
    <div class="falling-chips"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="font-size: 0.7em; letter-spacing: 5px; margin-bottom: 10px; opacity: 0.6;">КРУПНЕЙШИЙ СОЮЗ СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">НАЧИНАЕТСЯ ЗДЕСЬ</p>
        <div class="features">Быстрые выплаты • Моментальные депозиты • Честная игра</div>
        
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-box">
            <img src="card_only.png" class="card-img">
        </div>
        
        <p class="rb-text">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </section>
</body>
</html>
