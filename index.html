<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* ФОНОВЫЕ СЛОИ */
        .smoke-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('green-smoke-spread-black-background.jpg') center 0% / 160% auto no-repeat;
            z-index: -2;
            animation: smokeMoveVertical 60s ease-in-out infinite;
        }

        .chips-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('ФИШКИ .png') center/cover no-repeat;
            z-index: -1;
            mix-blend-mode: screen; 
            opacity: 0.6;
        }

        @keyframes smokeMoveVertical {
            0% { background-position: center 0%; }
            50% { background-position: center 100%; }
            100% { background-position: center 0%; }
        }

        header { padding: 20px; background: rgba(12, 13, 12, 0.7); border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); }
        .logo { font-size: 1.5em; font-weight: bold; color: #ccff00; letter-spacing: 2px; }

        .hero { padding: 60px 20px; position: relative; z-index: 10; }

        /* ПЕРЕЛИВАЮЩИЙСЯ ТЕКСТ (БЕЗОПАСНЫЙ ВАРИАНТ) */
        h1 { 
            font-size: 4.5em; 
            margin: 10px 0; 
            line-height: 0.9; 
            text-transform: uppercase; 
            font-weight: 900; 
            letter-spacing: -2px;

            /* Градиент */
            background: linear-gradient(90deg, #ccff00, #00FF7F, #00fac4, #ccff00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Вместо сложных теней используем простое свечение через фильтр */
            filter: drop-shadow(0 0 15px rgba(204, 255, 0, 0.4));
            
            animation: hueMove 4s linear infinite;
        }

        @keyframes hueMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .sub-text { font-size: 1.4em; color: #fff; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .features { color: #888; font-size: 1em; margin-bottom: 30px; letter-spacing: 1px; }

        .hero-btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); margin-bottom: 40px;
        }

        .card-container { perspective: 1200px; width: 100%; max-width: 500px; margin: 0 auto; }
        .card-img { 
            width: 100%; mix-blend-mode: screen; opacity: 0.85;
            filter: contrast(0.9) brightness(0.9) drop-shadow(0 0 30px rgba(204, 255, 0, 0.2));
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: rotateY(-15deg) rotateX(5deg) translateY(0); }
            50% { transform: rotateY(15deg) rotateX(-5deg) translateY(-25px); }
            100% { transform: rotateY(-15deg) rotateX(5deg) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="smoke-layer"></div>
    <div class="chips-layer"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <section class="hero">
        <div style="color: #888; text-transform: uppercase; letter-spacing: 5px; font-size: 0.8em; margin-bottom: 10px;">Крупнейший союз СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p class="sub-text">Начинается здесь</p>
        <div class="features">Быстрые выплаты • Моментальные депозиты • Честная игра</div>
        <a href="https://t.me/zamazka_vip_bot" class="hero-btn">🚀 ИГРАТЬ В TELEGRAM</a>
        <div class="card-container">
            <img src="card_only.png" alt="Poker Card" class="card-img">
        </div>
        <p style="color: #ccff00; font-weight: bold; margin-top: 30px; letter-spacing: 1px;">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </section>
</body>
</html>
