<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАМАЗКА _ViP | Покерный Клуб</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center; overflow-x: hidden; 
        }

        /* 1. ДЫМ — САМЫЙ ЗАДНИЙ ФОН (ГЛУБИНА -2) */
        #smoke-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('green-smoke-spread-black-background.jpg') center center / cover no-repeat;
            z-index: -2; /* Жестко в самый низ */
            pointer-events: none; /* Чтобы не мешал кликать */
        }

        /* 2. ФИШКИ — СЛОЙ НАД ДЫМОМ (ГЛУБИНА -1) */
        #chips-animation {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('ФИШКИ .png') repeat;
            background-size: 350px; 
            z-index: -1; /* Выше дыма, но под буквами */
            mix-blend-mode: screen; 
            opacity: 0.2;
            animation: fallChips 45s linear infinite;
            pointer-events: none;
        }

        @keyframes fallChips {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* КОНТЕНТ — ОН ВСЕГДА СВЕРХУ (z-index по умолчанию выше) */
        .content { position: relative; z-index: 10; padding-top: 60px; }

        header { padding: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); }
        .logo { color: #ccff00; font-weight: bold; font-size: 1.5em; letter-spacing: 2px; }

        /* ТВОЙ ЛИМОННЫЙ 3D ЗАГОЛОВОК */
        h1 { 
            color: #ccff00; font-size: 4.5em; margin: 15px 0; line-height: 0.9; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px;
            text-shadow: 
                0 1px 0 #88aa00, 0 2px 0 #779900, 0 3px 0 #668800, 
                0 4px 0 #557700, 0 10px 20px rgba(0,0,0,0.8);
        }

        .btn { 
            display: inline-block; background: #ccff00; color: #000; 
            padding: 18px 45px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; text-transform: uppercase; margin-top: 30px;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.4);
        }

        /* КАРТА — ТЕПЕРЬ ОНА ОДНА */
        .card-container { margin-top: 40px; }
        .card-img { 
            width: 85%; max-width: 420px; 
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 25px rgba(204,255,0,0.3));
        }

        .footer-text { color: #ccff00; font-weight: bold; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="smoke-background"></div>
    <div id="chips-animation"></div>

    <header><div class="logo">ЗАМАЗКА _ViP</div></header>

    <div class="content">
        <div style="color: #888; letter-spacing: 5px; font-size: 0.8em;">КРУПНЕЙШИЙ СОЮЗ СНГ</div>
        <h1>ТВОЙ ПУТЬ <br> К ПОБЕДЕ</h1>
        <p style="font-size: 1.3em; font-weight: bold; letter-spacing: 3px;">НАЧИНАЕТСЯ ЗДЕСЬ</p>
        
        <a href="https://t.me/zamazka_vip_bot" class="btn">🚀 ИГРАТЬ В TELEGRAM</a>
        
        <div class="card-container">
            <img src="card_only.png" class="card-img">
        </div>
        
        <p class="footer-text">+ 50% РЕЙКБЕК КАЖДОМУ ИГРОКУ</p>
    </div>
</body>
</html>
